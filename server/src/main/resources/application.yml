server:
  port: ${PORT:8080}

spring:
  application:
    name: bchospital
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bchospital}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  access-secret: ${JWT_ACCESS_SECRET:default-access-secret-minimum-256-bits-long-for-hs256}
  refresh-secret: ${JWT_REFRESH_SECRET:default-refresh-secret-minimum-256-bits-long-for-hs256}
  access-expiration: 900000 # 15 minutes in ms
  refresh-expiration: 604800000 # 7 days in ms

web3j:
  client-address: ${BESU_RPC_URL:http://localhost:8545}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

mail:
  host: ${MAIL_HOST:localhost}
  port: ${MAIL_PORT:2525}
  username: ${MAIL_USERNAME:}
  password: ${MAIL_PASSWORD:}

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /swagger-ui.html
